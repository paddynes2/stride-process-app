# ═══════════════════════════════════════════════════════════════════════════
#  RALPH LOOP CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
#
#  This file is sourced by ralph.sh. Use shell variable syntax.
#  Copy this file and edit for your project.
#
# ═══════════════════════════════════════════════════════════════════════════

# ─── Application ──────────────────────────────────────────────────────────

# Full URL to the running app (used for health checks and Playwright testing)
APP_URL="http://localhost:3000"

# Port number (used for fallback health check)
APP_PORT=3000

# Command to start the dev server (used if ralph needs to restart it)
APP_DEV_COMMAND="npm run dev"

# Health check endpoint (appended to APP_URL for liveness probe)
# Use "/" if no dedicated health endpoint exists
APP_HEALTH_ENDPOINT="/"

# Absolute path to the project root (where the code lives)
# Ralph runs commands from this directory
PROJECT_ROOT="/c/Users/Patrick/Builds/Cursor Projects/apps/Process App/stride"

# ─── Loop Behavior ────────────────────────────────────────────────────────

# Maximum iterations in AFK mode (./ralph.sh N uses the argument instead)
LOOP_MAX_ITERATIONS=20

# Circuit breaker: stop after this many CONSECUTIVE failed iterations
# A "failure" is a blocked or partial result in PROGRESS.md
LOOP_CIRCUIT_BREAKER=3

# Seconds to pause between iterations in AFK mode
# Prevents API hammering; set to 0 for maximum speed
LOOP_SLEEP_BETWEEN=2

# ─── Git ──────────────────────────────────────────────────────────────────

# Branch name prefix for ralph sessions
# Ralph creates branches like: ralph/session-20260225-143000
GIT_BRANCH_PREFIX="ralph"

# Tag prefix for iteration checkpoints
# Each successful iteration creates: ralph-iter-1, ralph-iter-2, etc.
GIT_TAG_PREFIX="ralph-iter"

# ─── Testing ──────────────────────────────────────────────────────────────

# Action budget for quick verification testing during a build iteration
# TESTING_ITERATION_BUDGET=10

# Action budget for full test suite runs (separate tasks)
# TESTING_SUITE_BUDGET=40

# ─── Regression ───────────────────────────────────────────────────────────

# Run regression testing every N iterations
# Set to 0 to disable (not recommended)
# REGRESSION_EVERY=5
